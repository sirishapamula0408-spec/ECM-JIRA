# Production compose for the ECM JIRA Clone (JL-97).
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Services:
#   - app      : Express API + built /dist (single Node container, see Dockerfile)
#   - postgres : PostgreSQL 16 with a persistent volume
#   - nginx    : optional reverse proxy for HTTPS/TLS termination (see profile below)
#
# TLS / reverse proxy: the `nginx` service is behind the `proxy` profile so it
# only starts when you opt in:
#   docker compose -f docker-compose.prod.yml --profile proxy up -d --build
# Configure it from nginx.conf.example and mount your certificates. For a simple
# deployment you may instead front `app` with a managed load balancer / Caddy /
# Traefik that terminates TLS and proxies to app:4000.
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecm-jira-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVE_STATIC: '1'
      PORT: '4000'
      DATABASE_URL: postgresql://jira_lite:${POSTGRES_PASSWORD:-jira_lite_dev}@postgres:5432/jira_lite
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in your environment/.env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      APP_URL: ${APP_URL:-http://localhost:4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - '4000:4000'
    volumes:
      - uploads:/app/server/uploads
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: ecm-jira-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jira_lite
      POSTGRES_USER: jira_lite
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jira_lite_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jira_lite -d jira_lite']
      interval: 5s
      timeout: 3s
      retries: 5

  # Optional TLS-terminating reverse proxy. Enable with `--profile proxy`.
  nginx:
    image: nginx:1.27-alpine
    container_name: ecm-jira-proxy
    profiles: ['proxy']
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf.example:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
