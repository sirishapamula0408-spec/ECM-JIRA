# Auto-deploy to the production server.
#
# Fires after the "CI" workflow finishes successfully on `main` (so we only
# ever deploy green commits), or manually via the Actions tab. It SSHes into
# the server and runs deploy.prod.sh, which builds the SPA, reloads the API
# under PM2, and reloads nginx. See deploy/README.md for server setup.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST         server host/IP           e.g. 20.219.248.167
#   SSH_USER         SSH login user           e.g. azureuser
#   SSH_PRIVATE_KEY  private key (PEM) whose public half is in the server's
#                    ~/.ssh/authorized_keys
#   APP_DIR          repo path on the server  e.g. /var/www/ecm-jira
#   SSH_PORT           (optional) SSH port; defaults to 22
#   SLACK_WEBHOOK_URL  (optional) Slack Incoming Webhook — posts deploy
#                      success/failure; the notify step no-ops if unset
name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys at once; let an in-flight deploy finish rather than
# cancelling it half-way through a build/restart.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    # Deploy on a manual run, or only when the triggering CI run passed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    # Optional: gives a deployment record + lets you add required reviewers
    # (Settings → Environments → production). Auto-created on first run.
    environment: production
    steps:
      - name: Deploy over SSH
        id: deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.APP_DIR }}"
            # Update the working tree first so we run the LATEST deploy.prod.sh
            # (a fresh bash process reads the updated file after the reset).
            git fetch origin --prune
            git checkout main
            git reset --hard origin/main
            bash ./deploy.prod.sh

      # Post the deploy result to Slack. Runs regardless of the deploy
      # outcome; no-ops (exit 0) when SLACK_WEBHOOK_URL isn't configured.
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification"
            exit 0
          fi
          if [ "$OUTCOME" = "success" ]; then
            EMOJI="✅"; COLOR="good"; WORD="succeeded"
          else
            EMOJI="❌"; COLOR="danger"; WORD="failed"
          fi
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD="$(jq -n \
            --arg color "$COLOR" \
            --arg text "$EMOJI Deploy $WORD — *${{ github.repository }}* @ \`$SHORT_SHA\`" \
            --arg ctx "triggered by ${{ github.actor }} • <$RUN_URL|view workflow run>" \
            '{attachments:[{color:$color,blocks:[
               {type:"section",text:{type:"mrkdwn",text:$text}},
               {type:"context",elements:[{type:"mrkdwn",text:$ctx}]}
             ]}]}')"
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
