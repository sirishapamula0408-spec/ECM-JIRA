# JL-99 — Continuous Integration pipeline
#
# ESLint note: a corrupted local install of `acorn-jsx@5.3.2` (missing its
# `xhtml.js` file) makes `npm run lint` fail with `Cannot find module './xhtml'`.
# CI avoids this because `npm ci` performs a clean, from-lockfile install that
# fetches a complete `acorn-jsx` package. The `overrides` entry in package.json
# pins `acorn-jsx` to 5.3.2 so the resolution stays deterministic. Locally, run
# `npm install` once after pulling this change to repair the broken package.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    # ESLint is not yet gating — surface issues without blocking the pipeline
    # until the acorn-jsx pin has been applied everywhere.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jira_lite
          POSTGRES_PASSWORD: jira_lite_dev
          POSTGRES_DB: jira_lite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jira_lite -d jira_lite_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://jira_lite:jira_lite_dev@localhost:5432/jira_lite_test
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test

  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
