version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jira-lite-db
    environment:
      POSTGRES_DB: jira_lite
      POSTGRES_USER: jira_lite
      POSTGRES_PASSWORD: jira_lite_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jira_lite -d jira_lite']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
