# nginx site config for ECM JIRA Clone (production).
#
# Serves the built SPA (dist/) and reverse-proxies the API, the SSE
# notification stream, and the JL-136 WebSocket realtime hub (/ws) to the
# Express server on 127.0.0.1:4000 (run under PM2 — see ecosystem.config.cjs).
#
# One-time install (see deploy/README.md for the full walkthrough):
#   sudo cp deploy/nginx/jira-lite.conf /etc/nginx/sites-available/jira-lite
#   sudo ln -sf /etc/nginx/sites-available/jira-lite /etc/nginx/sites-enabled/jira-lite
#   sudo rm -f /etc/nginx/sites-enabled/default        # if present
#   sudo nginx -t && sudo systemctl reload nginx
#
# Adjust `root`, `server_name`, and add TLS (certbot) for real domains.

server {
    listen 80;
    server_name 20.219.248.167;   # <-- your domain or public IP

    # Built SPA assets. Must match WEB_ROOT in deploy.prod.sh
    # (defaults to <repo>/dist if WEB_ROOT is unset).
    root /var/www/ecm-jira/dist;
    index index.html;

    # Attachments upload is base64-over-JSON with a 25mb express.json limit;
    # allow headroom for the base64 inflation.
    client_max_body_size 30m;

    # Fingerprinted build assets — cache hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket realtime hub (JL-136) at /ws — needs the upgrade dance.
    # Declared before /api/ and / so it wins for the exact /ws path.
    location = /ws {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;   # keep long-lived sockets open
        proxy_send_timeout 3600s;
    }

    # REST API + SSE. proxy_buffering must be off so
    # /api/notifications/stream (text/event-stream) flushes immediately.
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;        # SSE: stream, don't buffer
        proxy_cache off;
        proxy_read_timeout 3600s;   # long-lived SSE connections
    }

    # SPA fallback — client-side routing serves index.html for all app paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
